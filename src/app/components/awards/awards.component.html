<section id="awards" class="section-padding bg-[var(--bg-alt)]">
  <div class="container-custom">

    <!-- Header -->
    <div class="section-header reveal">
      <div class="section-tag"><i class="fas fa-trophy text-xs"></i> Awards</div>
      <h2>Achievements & <span class="text-gradient">Certifications</span></h2>
      <p>Recognition spanning performance, technical expertise and competitive wins.</p>
      <div class="section-line"></div>
    </div>

    <!-- Awards grid -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
      <div *ngFor="let award of awards; let i = index"
           class="card award-card group reveal reveal-scale"
           [class]="'delay-' + (i + 1)">

        <!-- Icon + Year -->
        <div class="flex items-start justify-between mb-4">
          <div class="award-icon-wrap" [style.background]="getAwardGlow(award.year)">
            <i [class]="award.icon + ' text-lg'" [style.color]="getAwardAccent(award.year)"></i>
          </div>
          <span class="award-year-badge" [style.color]="getAwardAccent(award.year)"
                [style.background]="getAwardGlow(award.year)"
                [style.border-color]="getAwardAccent(award.year) + '30'">
            {{ award.year }}
          </span>
        </div>

        <!-- Content -->
        <h3 class="text-base font-bold text-[var(--text-1)] mb-1 group-hover:text-[var(--accent)] transition-colors duration-200 leading-snug">
          {{ award.title }}
        </h3>
        <p class="text-xs font-semibold text-[var(--accent)] mb-3 opacity-80">{{ award.issuer }}</p>
        <p class="text-sm text-[var(--text-2)] leading-relaxed">{{ award.description }}</p>

        <!-- Shimmer line -->
        <div class="award-shimmer mt-4"></div>

      </div>
    </div>

  </div>
</section>
