<footer class="footer-wrap border-t border-[var(--border)]">
  <div class="container-custom py-14 lg:py-16">

    <!-- Top grid -->
    <div class="grid lg:grid-cols-4 md:grid-cols-2 gap-10 mb-12">

      <!-- Brand -->
      <div class="lg:col-span-2">
        <div class="flex items-center gap-3 mb-4">
          <div class="footer-logo">
            <span class="text-white font-black text-sm">BG</span>
          </div>
          <span class="text-xl font-bold text-[var(--text-1)]">Bhushan Gadekar</span>
        </div>
        <p class="text-sm text-[var(--text-2)] leading-relaxed mb-6 max-w-sm">
          Tech Team Lead with 10+ years building scalable web applications and microservices.
          Passionate about clean code, developer experience and team growth.
        </p>

        <!-- Social icons -->
        <div class="flex gap-2">
          <button (click)="openLinkedIn()"    class="social-icon" title="LinkedIn">
            <i class="fab fa-linkedin-in text-sm"></i>
          </button>
          <button (click)="openGitHub()"      class="social-icon" title="GitHub">
            <i class="fab fa-github text-sm"></i>
          </button>
          <button (click)="openStackOverflow()" class="social-icon" title="Stack Overflow">
            <i class="fab fa-stack-overflow text-sm"></i>
          </button>
          <button (click)="openEmail()"       class="social-icon" title="Email">
            <i class="fas fa-envelope text-sm"></i>
          </button>
        </div>
      </div>

      <!-- Quick links -->
      <div>
        <h4 class="footer-heading">Navigation</h4>
        <ul class="space-y-2.5">
          <li *ngFor="let link of navLinks">
            <button (click)="scrollToSection(link.id)" class="footer-link">{{ link.label }}</button>
          </li>
        </ul>
      </div>

      <!-- Contact -->
      <div>
        <h4 class="footer-heading">Contact</h4>
        <div class="space-y-2.5">
          <button (click)="openEmail()" class="footer-link flex items-center gap-2">
            <i class="fas fa-envelope text-xs text-[var(--accent)] w-4 text-center"></i>
            {{ contactInfo?.email }}
          </button>
          <button (click)="openPhone()" class="footer-link flex items-center gap-2">
            <i class="fas fa-phone text-xs text-[var(--accent)] w-4 text-center"></i>
            {{ contactInfo?.phone }}
          </button>
          <span class="footer-link flex items-center gap-2 cursor-default hover:text-[var(--text-2)]">
            <i class="fas fa-location-dot text-xs text-[var(--accent)] w-4 text-center"></i>
            Pune, India
          </span>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="h-px bg-gradient-to-r from-transparent via-[var(--border)] to-transparent mb-6"></div>

    <!-- Bottom bar -->
    <div class="flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-[var(--text-3)]">
      <p>&copy; {{ currentYear }} Bhushan Gadekar. Built with Angular &amp; Tailwind.</p>
      <button (click)="scrollToTop()" class="back-top-btn">
        <i class="fas fa-arrow-up text-xs"></i>
        <span>Back to top</span>
      </button>
    </div>

  </div>
</footer>
