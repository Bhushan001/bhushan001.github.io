<section id="skills" class="section-padding bg-[var(--bg)]">
  <div class="container-custom">

    <!-- Header -->
    <div class="section-header reveal">
      <div class="section-tag"><i class="fas fa-code text-xs"></i> Skills</div>
      <h2>My <span class="text-gradient">Technical Arsenal</span></h2>
      <p>27 skills across 6 categories — from frontend frameworks to cloud infrastructure.</p>
      <div class="section-line"></div>
    </div>

    <!-- Stats row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 reveal">
      <div *ngFor="let s of summaryStats" class="skill-stat-card">
        <span class="stat-val text-gradient">{{ s.val }}</span>
        <span class="stat-lbl text-[var(--text-3)]">{{ s.lbl }}</span>
      </div>
    </div>

    <!-- Categories -->
    <div class="grid lg:grid-cols-2 gap-6">
      <div *ngFor="let cat of Object.keys(skillCategories); let ci = index"
           class="card skill-cat-card reveal"
           [class]="'delay-' + (ci + 1)">

        <!-- Category header -->
        <div class="flex items-center gap-3 mb-5">
          <div class="cat-icon" [style.background]="getCategoryBg(cat)">
            <i [class]="getCategoryIcon(cat) + ' text-sm'" [style.color]="getCategoryColor(cat)"></i>
          </div>
          <div>
            <h3 class="text-base font-bold text-[var(--text-1)]">{{ cat }}</h3>
            <p class="text-xs text-[var(--text-3)]">{{ skillCategories[cat].length }} skills</p>
          </div>
        </div>

        <!-- Skills as chips with bars -->
        <div class="space-y-3">
          <div *ngFor="let skill of skillCategories[cat]" class="skill-row">
            <div class="flex items-center justify-between mb-1">
              <div class="flex items-center gap-2">
                <i [class]="skill.icon + ' text-sm'" [style.color]="skill.color"></i>
                <span class="text-sm font-medium text-[var(--text-1)]">{{ skill.name }}</span>
              </div>
              <span class="text-xs font-semibold" [style.color]="skill.color">{{ skill.proficiency }}%</span>
            </div>
            <div class="skill-bar-track">
              <div class="skill-bar-fill skill-bar"
                   [attr.data-progress]="skill.proficiency"
                   [style.background]="'linear-gradient(90deg,' + skill.color + ',' + skill.color + '99)'">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
