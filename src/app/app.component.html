<!-- ─── Navigation ─────────────────────────────────────────────────────────── -->
<nav class="nav-bar fixed top-0 left-0 right-0 z-50 transition-all duration-500"
     [class.nav-scrolled]="isScrolled">

  <div class="container-custom">
    <div class="flex items-center justify-between h-18">

      <!-- Logo -->
      <button class="logo-btn flex items-center gap-3 group" (click)="scrollToSection('home')">
        <div class="logo-mark w-9 h-9 rounded-xl flex items-center justify-center text-white text-sm font-bold relative overflow-hidden">
          <span class="relative z-10">BG</span>
        </div>
        <div class="flex flex-col leading-none">
          <span class="text-sm font-700 text-[var(--text-1)] font-bold">Bhushan Gadekar</span>
          <span class="text-xs text-[var(--text-3)] font-medium mt-0.5">Senior Engineer · UX</span>
        </div>
      </button>

      <!-- Desktop nav links -->
      <div class="hidden lg:flex items-center gap-1 p-1 rounded-2xl bg-[var(--card-bg)] border border-[var(--border)] backdrop-blur-sm">
        <ng-container *ngFor="let link of navLinks">
          <button
            class="nav-link px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 relative"
            [class.nav-link--active]="activeSection === link.id"
            (click)="scrollToSection(link.id)">
            {{ link.label }}
          </button>
        </ng-container>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-2">

        <!-- Theme toggle -->
        <button (click)="toggleTheme()"
                class="theme-btn w-9 h-9 rounded-xl flex items-center justify-center border border-[var(--border)] bg-[var(--card-bg)] text-[var(--text-2)] hover:text-[var(--accent)] hover:border-[var(--accent)] transition-all duration-200">
          <i *ngIf="!isDarkMode" class="fas fa-moon text-sm"></i>
          <i *ngIf="isDarkMode"  class="fas fa-sun text-sm"></i>
        </button>

        <!-- Mobile menu button -->
        <button (click)="toggleMenu()"
                class="lg:hidden w-9 h-9 rounded-xl flex items-center justify-center border border-[var(--border)] bg-[var(--card-bg)] text-[var(--text-2)] transition-all duration-200">
          <i [class]="isMenuOpen ? 'fas fa-times text-sm' : 'fas fa-bars text-sm'"></i>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="isMenuOpen" class="lg:hidden mobile-menu pb-4 animate-slide-down">
      <div class="flex flex-col gap-1 p-2 rounded-2xl border border-[var(--border)] bg-[var(--card-bg)] mt-2">
        <ng-container *ngFor="let link of navLinks">
          <button
            class="mobile-nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[var(--text-2)] transition-all duration-200"
            [class.mobile-nav-link--active]="activeSection === link.id"
            (click)="scrollToSection(link.id)">
            <i [class]="link.icon + ' text-[var(--accent)] w-4 text-center'"></i>
            {{ link.label }}
          </button>
        </ng-container>
      </div>
    </div>
  </div>
</nav>

<!-- Noise texture overlay -->
<div class="noise-overlay" aria-hidden="true"></div>

<!-- ─── Main Content ──────────────────────────────────────────────────────── -->
<main class="pt-[4.5rem]">
  <app-hero></app-hero>
  <app-about></app-about>
  <app-skills></app-skills>
  <app-experience></app-experience>
  <app-projects></app-projects>
  <app-awards></app-awards>
  <app-contact></app-contact>
  <app-footer></app-footer>
</main>

<!-- Scroll to top -->
<button *ngIf="isScrolled"
        (click)="scrollToSection('home')"
        class="scroll-top-btn fixed bottom-8 right-8 w-11 h-11 rounded-xl flex items-center justify-center text-white z-40 transition-all duration-300 animate-fade-in">
  <i class="fas fa-arrow-up text-sm"></i>
</button>
