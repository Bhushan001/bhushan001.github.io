<section id="experience" class="section-padding bg-[var(--bg-alt)]">
  <div class="container-custom">

    <!-- Header -->
    <div class="section-header reveal">
      <div class="section-tag"><i class="fas fa-briefcase text-xs"></i> Experience</div>
      <h2>Professional <span class="text-gradient">Journey</span></h2>
      <p>10+ years across 5 companies — building products used by thousands.</p>
      <div class="section-line"></div>
    </div>

    <!-- Timeline -->
    <div class="timeline-wrap relative">

      <!-- Vertical line -->
      <div class="timeline-line"></div>

      <div class="space-y-8">
        <div *ngFor="let exp of experiences; let i = index"
             class="timeline-item reveal reveal-left"
             [class]="'delay-' + (i + 1)">

          <!-- Dot on the line -->
          <div class="timeline-dot" [class.timeline-dot--current]="exp.isCurrent">
            <div class="timeline-dot-inner"></div>
          </div>

          <!-- Card -->
          <div class="card exp-card ml-10 lg:ml-14">

            <!-- Header row -->
            <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
              <div>
                <h3 class="text-lg font-bold text-[var(--text-1)] leading-tight">{{ exp.title }}</h3>
                <p class="text-[var(--accent)] font-semibold text-sm mt-0.5">{{ exp.company }}</p>
                <div class="flex items-center gap-2 mt-1 text-xs text-[var(--text-3)]">
                  <i class="fas fa-location-dot"></i>
                  <span>{{ exp.location }}</span>
                  <span class="opacity-40">·</span>
                  <i class="fas fa-calendar-alt"></i>
                  <span [class.text-emerald-500]="exp.isCurrent">{{ exp.duration }}</span>
                </div>
              </div>
              <span class="exp-badge" [class.exp-badge--current]="exp.isCurrent">
                {{ exp.isCurrent ? 'Current' : 'Past' }}
              </span>
            </div>

            <!-- Description -->
            <p class="text-sm text-[var(--text-2)] leading-relaxed mb-4">{{ exp.description }}</p>

            <!-- Achievements -->
            <div class="mb-4">
              <p class="text-xs font-semibold text-[var(--text-3)] uppercase tracking-widest mb-2.5">
                <i class="fas fa-star text-amber-400 mr-1.5"></i>Key Achievements
              </p>
              <ul class="space-y-1.5">
                <li *ngFor="let a of exp.achievements"
                    class="flex items-start gap-2 text-sm text-[var(--text-2)]">
                  <i class="fas fa-check-circle text-emerald-500 mt-0.5 flex-shrink-0 text-xs"></i>
                  {{ a }}
                </li>
              </ul>
            </div>

            <!-- Technologies -->
            <div class="flex flex-wrap gap-1.5 pt-4 border-t border-[var(--border)]">
              <span *ngFor="let t of exp.technologies" class="tech-tag">{{ t }}</span>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</section>
